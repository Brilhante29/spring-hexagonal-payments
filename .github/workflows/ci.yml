name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v6
      - name: Test and enforce core coverage
        run: ./gradlew test writeCoverage --no-daemon
      - name: Build one-container demo
        run: docker build -t spring-hexagonal-payments .
      - name: Smoke benchmark
        run: >-
          docker run --rm
          -e DURATION=1s
          -e VUS=8
          -e WARMUP_REQUESTS=20
          -e RESULT_PATH=/tmp/payments-smoke.json
          spring-hexagonal-payments
      - name: Validate portfolio contract
        shell: pwsh
        run: ./tools/validate-project.ps1 -SkipDocker

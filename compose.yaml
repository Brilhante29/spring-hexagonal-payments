services:
  postgres:
    image: postgres:18.4-alpine
    environment: { POSTGRES_DB: payments, POSTGRES_USER: payments, POSTGRES_PASSWORD: payments }
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U payments -d payments"], interval: 2s, timeout: 2s, retries: 20 }
  app:
    build: { context: ., target: app }
    environment: { DB_URL: jdbc:postgresql://postgres:5432/payments, DB_USER: payments, DB_PASSWORD: payments }
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }

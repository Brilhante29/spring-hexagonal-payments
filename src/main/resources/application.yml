spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  application:
    name: spring-hexagonal-payments
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/payments}
    username: ${DB_USER:payments}
    password: ${DB_PASSWORD:payments}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:16}
      minimum-idle: 2
      connection-timeout: 2000
  flyway:
    enabled: true
server:
  shutdown: graceful
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
